name: dbt Build and Test

on:
  push:
    branches: [main]
  schedule:
    # Daily at 06:10 UTC — after the SCADA fetch window settles
    - cron: "10 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  dbt-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write Bronze Parquet
        run: python ingestion/bronze_writer.py

      - name: dbt build (run + test)
        run: dbt build --profiles-dir profiles/

      - name: Commit generated Bronze and DuckDB outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git add data/bronze/*.parquet 2>/dev/null || true
          git add nem.duckdb
          if git diff --staged --quiet; then
            echo "No dbt artifacts changed."
            exit 0
          fi
          git commit -m "chore: update bronze parquet and duckdb build"
          git push
