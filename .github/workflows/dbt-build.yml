name: dbt Build and Test

on:
  push:
    branches: [main]
  schedule:
    # Daily at 06:10 UTC — after the SCADA fetch window settles
    - cron: "10 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  dbt-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write Bronze Parquet
        run: python ingestion/bronze_writer.py

      - name: dbt build (run + test)
        run: dbt build --profiles-dir profiles/

      - name: Commit and push updated database
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update nem.duckdb from dbt build"
          file_pattern: "nem.duckdb"
          commit_options: "--no-verify"
