name: Fetch AEMO Dispatch SCADA

on:
  schedule:
    - cron: "2-57/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: aemo-dispatch-scada
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fetch-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Refresh dispatch SCADA snapshot
        env:
          AEMO_ZIP_LOOKBACK: "288"
          AEMO_OVERLAP_MINUTES: "15"
        run: python importdata.py

      - name: Commit updated CSV back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git add data/dispatch_scada_today.csv
          git add data/dispatch_scada_????-??.csv 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No data changes to commit."
            exit 0
          fi
          git commit -m "Auto: update SCADA data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
